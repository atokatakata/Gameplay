<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>JS SURVIVOR - ULTIMATE COMPLETE EDITION</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #05050a; font-family: sans-serif; touch-action: none; color: white; user-select: none; }
        canvas { display: block; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.85); z-index: 20; }
        .hidden { display: none !important; }
        h1 { font-size: 36px; color: #00ffcc; text-shadow: 0 0 15px #00ffcc; text-align: center;}
        h2 { color: #ffcc00; }
        button, select, input { font-size: 16px; padding: 10px 20px; margin: 5px; border-radius: 6px; background: #111; color: white; border: 2px solid #555; cursor: pointer; transition: 0.2s; }
        button:hover { border-color: #00ffcc; box-shadow: 0 0 10px #00ffcc; }
        
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; padding: 10px; box-sizing: border-box; pointer-events: none; z-index: 10; }
        .stats { display: flex; justify-content: space-between; font-size: 18px; font-weight: bold; text-shadow: 2px 2px 0 #000; }
        #exp-bg { width: 100%; height: 8px; background: #222; border-radius: 4px; margin-top: 8px; border: 1px solid #555; }
        #exp-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #0fcc88, #00ffcc); transition: 0.1s; }
        
        .char-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; max-height: 60vh; overflow-y: auto; padding: 10px; pointer-events: auto;}
        .char-box { border: 2px solid #444; border-radius: 8px; padding: 10px; text-align: center; cursor: pointer; background: #1a1a2e; font-size: 12px; }
        .char-box.owned { border-color: #00ffcc; }
        .char-box.selected { background: #005555; border-color: #fff; }
        .awake-badge { display: inline-block; font-size: 10px; background: #ff00ff; color: #fff; padding: 2px 5px; border-radius: 3px; margin-top: 4px; font-weight: bold;}
        
        #skill-container { display: flex; flex-direction: column; gap: 10px; width: 80%; max-width: 400px; }
        .skill-btn { background: #222; border: 2px solid #ffcc00; font-size: 18px; padding: 15px; }
    </style>
</head>
<body>

    <div id="screen-login" class="overlay">
        <h1>JS SURVIVOR<br><span style="font-size:20px;color:#fff;">ULTIMATE EDITION</span></h1>
        <input type="text" id="player-name" placeholder="プレイヤー名" maxlength="10">
        <button id="btn-login">ゲーム開始</button>
    </div>

    <div id="screen-home" class="overlay hidden">
        <h2 id="disp-name"></h2>
        <p>所持コイン: <span id="disp-coins" style="color:#ffcc00; font-size:24px; font-weight:bold;">0</span> C</p>
        <select id="stage-select"></select>
        <div style="margin-top: 15px;">
            <button id="btn-start" style="border-color:#00ffcc; color:#00ffcc;">通常出撃</button>
            <button id="btn-raid" style="border-color:#ff00ff; color:#ffccff;">レイド（覚醒挑戦）</button>
        </div>
        <div style="margin-top: 10px;">
            <button id="btn-chars">キャラクター変更</button>
            <button id="btn-gacha">ガチャ (1000C)</button>
        </div>
    </div>

    <div id="screen-chars" class="overlay hidden">
        <h2>キャラクター選択</h2>
        <div id="char-list" class="char-grid"></div>
        <button id="btn-close-chars">戻る</button>
    </div>

    <div id="screen-raid" class="overlay hidden">
        <h2 style="color:#ff00ff;">挑む覚醒ボスを選択</h2>
        <div id="raid-list" class="char-grid"></div>
        <button id="btn-close-raid">戻る</button>
    </div>

    <div id="screen-gacha" class="overlay hidden">
        <h1 style="color:#ff00ff;">GACHA</h1>
        <button id="btn-pull" style="font-size:24px; padding: 15px 30px;">引く</button>
        <div id="gacha-res" style="font-size:24px; margin:20px; font-weight:bold;"></div>
        <button id="btn-close-gacha">戻る</button>
    </div>

    <div id="screen-levelup" class="overlay hidden">
        <h1 style="color:#ffcc00;">LEVEL UP!</h1>
        <div id="skill-container"></div>
    </div>

    <div id="screen-result" class="overlay hidden">
        <h1 id="res-title"></h1>
        <p>獲得コイン: <span id="res-coins" style="font-size:24px; color:#ffcc00;"></span> C</p>
        <button id="btn-restart">HOMEに戻る</button>
    </div>

    <div id="ui-layer" class="hidden">
        <div class="stats">
            <div>Lv.<span id="ui-level">1</span></div>
            <div id="timer">05:00</div>
            <div id="ui-char" style="color:#00ffcc;"></div>
        </div>
        <div id="exp-bg"><div id="exp-bar"></div></div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        function resize() { width = window.innerWidth; height = window.innerHeight; canvas.width = width; canvas.height = height; }
        window.addEventListener('resize', resize); resize();

        let saveData = { name: "", coins: 0, unlockedStage: 1, chars: [0], selectedChar: 0, awakeData: {} };
        
        // 0:ヒューマン, 19:カミサマ（覚醒対象外）
        const CHARS = [
            { id: 0, name: "ヒューマン", color: "#09f", hp: 150, spd: 4.2, atk: 25 },
            { id: 1, name: "ニンジャ", color: "#333", hp: 100, spd: 6.0, atk: 20 },
            { id: 2, name: "タンク", color: "#8b4", hp: 400, spd: 2.8, atk: 30 },
            { id: 3, name: "スナイパ", color: "#0f0", hp: 120, spd: 3.8, atk: 60 },
            { id: 4, name: "マグネ", color: "#f0f", hp: 150, spd: 4.0, atk: 22 },
            { id: 5, name: "パラディン", color: "#fd0", hp: 200, spd: 3.5, atk: 25 },
            { id: 6, name: "ガンナー", color: "#f40", hp: 140, spd: 4.2, atk: 18 },
            { id: 7, name: "ヴァンピ", color: "#808", hp: 150, spd: 4.5, atk: 25 },
            { id: 8, name: "サイボグ", color: "#789", hp: 250, spd: 3.5, atk: 40 },
            { id: 9, name: "エスパー", color: "#0ff", hp: 120, spd: 4.8, atk: 20 },
            { id: 10, name: "バーサカ", color: "#b22", hp: 180, spd: 4.8, atk: 55 },
            { id: 11, name: "ゴースト", color: "#eee", hp: 80, spd: 5.5, atk: 22 },
            { id: 12, name: "サムライ", color: "#c55", hp: 160, spd: 4.5, atk: 45 },
            { id: 13, name: "リッチ", color: "#438", hp: 130, spd: 4.0, atk: 35 },
            { id: 14, name: "ギャンブ", color: "#f19", hp: 150, spd: 4.2, atk: 15 },
            { id: 15, name: "ドクター", color: "#fff", hp: 180, spd: 3.8, atk: 20 },
            { id: 16, name: "アーチャ", color: "#282", hp: 140, spd: 4.6, atk: 35 },
            { id: 17, name: "エイリア", color: "#7f0", hp: 150, spd: 5.0, atk: 30 },
            { id: 18, name: "ドラゴン", color: "#f20", hp: 300, spd: 4.0, atk: 50 },
            { id: 19, name: "カミサマ", color: "#fe0", hp: 600, spd: 5.5, atk: 80 }
        ];

        function getAwake(id) { return saveData.awakeData[id] || 0; }
        function save() { localStorage.setItem('jsSurvivorUltimate', JSON.stringify(saveData)); }
        function load() {
            let d = localStorage.getItem('jsSurvivorUltimate');
            if(d) saveData = JSON.parse(d);
            if(!saveData.awakeData) saveData.awakeData = {};
            if(saveData.name) { document.getElementById('screen-login').classList.add('hidden'); openHome(); }
        }

        let state = 'LOGIN', time = 300, frame = 0, isBoss = false, stage = 1;
        let p, eList, bList, gList, minions, traps;
        let tPos = { x: 0, y: 0 };
        let isRaid = false, raidId = 0;

        document.getElementById('btn-login').onclick = () => {
            if(!document.getElementById('player-name').value) return;
            saveData.name = document.getElementById('player-name').value; save();
            document.getElementById('screen-login').classList.add('hidden'); openHome();
        };

        function openHome() {
            state = 'HOME';
            document.getElementById('disp-name').innerText = saveData.name;
            document.getElementById('disp-coins').innerText = saveData.coins;
            let sel = document.getElementById('stage-select'); sel.innerHTML = "";
            for(let i=1; i<=30; i++) {
                let opt = document.createElement('option'); opt.value = i; opt.innerText = `STAGE ${i}`;
                if(i > saveData.unlockedStage) opt.disabled = true;
                sel.appendChild(opt);
            }
            document.querySelectorAll('.overlay').forEach(el => el.classList.add('hidden'));
            document.getElementById('screen-home').classList.remove('hidden');
        }

        document.getElementById('btn-chars').onclick = () => {
            document.getElementById('screen-home').classList.add('hidden');
            let list = document.getElementById('char-list'); list.innerHTML = "";
            CHARS.forEach(c => {
                let owns = saveData.chars.includes(c.id);
                let div = document.createElement('div');
                let alv = getAwake(c.id);
                div.className = `char-box ${owns?'owned':''} ${saveData.selectedChar===c.id?'selected':''}`;
                div.innerHTML = `<strong>${owns?c.name:'???'}</strong><br>${alv>0?'<span class="awake-badge">Lv.'+alv+'</span>':''}`;
                if(owns) div.onclick = () => { saveData.selectedChar = c.id; save(); document.getElementById('btn-chars').click(); };
                list.appendChild(div);
            });
            document.getElementById('screen-chars').classList.remove('hidden');
        };
        document.getElementById('btn-close-chars').onclick = openHome;

        document.getElementById('btn-raid').onclick = () => {
            document.getElementById('screen-home').classList.add('hidden');
            let list = document.getElementById('raid-list'); list.innerHTML = "";
            CHARS.forEach(c => {
                // ヒューマン(0)とカミサマ(19)は対象外
                if(saveData.chars.includes(c.id) && c.id !== 19 && c.id !== 0) {
                    let alv = getAwake(c.id);
                    let div = document.createElement('div'); div.className = 'char-box owned';
                    div.innerHTML = `<strong>${c.name}</strong><br>次: Lv.${alv+1}`;
                    if(alv < 4) div.onclick = () => { if(confirm(`${c.name}の覚醒Lv.${alv+1}ボスに挑む？`)){ raidId=c.id; isRaid=true; init(); } };
                    else div.innerHTML += "<br>MAX";
                    list.appendChild(div);
                }
            });
            document.getElementById('screen-raid').classList.remove('hidden');
        };
        document.getElementById('btn-close-raid').onclick = openHome;

        document.getElementById('btn-gacha').onclick = () => {
            document.getElementById('screen-home').classList.add('hidden');
            document.getElementById('screen-gacha').classList.remove('hidden');
        };
        document.getElementById('btn-close-gacha').onclick = openHome;
        document.getElementById('btn-pull').onclick = () => {
            if(saveData.coins < 1000) return; saveData.coins -= 1000;
            let n = Math.floor(Math.random()*19); if(Math.random()<0.01) n=19; // 神様1%
            let res = document.getElementById('gacha-res');
            if(saveData.chars.includes(n)) { res.innerText = CHARS[n].name+" (被り/300C還元)"; saveData.coins+=300; }
            else { res.innerText = "NEW! "+CHARS[n].name; saveData.chars.push(n); }
            save(); document.getElementById('disp-coins').innerText = saveData.coins;
        };

        document.getElementById('btn-start').onclick = () => { isRaid=false; init(); };

        function init() {
            stage = parseInt(document.getElementById('stage-select').value);
            let c = CHARS[saveData.selectedChar]; let alv = getAwake(c.id);
            p = { x:width/2, y:height/2, size:15, hp:c.hp, maxHp:c.hp, cid:c.id, alv:alv, exp:0, max:3, lv:1, atk:c.atk, spd:c.spd, 
                  mag:100, shots:1, color:c.color, revived:false, shield:0 };
            eList=[]; bList=[]; gList=[]; minions=[]; traps=[];
            time=300; frame=0; isBoss=false; tPos={x:p.x,y:p.y}; state='PLAYING';
            document.querySelectorAll('.overlay').forEach(el=>el.classList.add('hidden'));
            document.getElementById('ui-layer').classList.remove('hidden');
            document.getElementById('ui-char').innerText = c.name + (alv>0?` +${alv}`:'');
            loop();
        }

        function spawnE() {
            if(isBoss) return;
            let x = Math.random() < 0.5 ? -30 : width+30; let y = Math.random() * height;
            eList.push({x, y, size:12, hp:20*(1+stage*0.2), spd:1.5+Math.random(), isBoss:false});
        }
        function spawnB() {
            isBoss = true; let hp = isRaid ? 80000*(getAwake(raidId)+1) : 15000*stage;
            eList.push({x:width/2, y:-100, size:80, hp:hp, maxHp:hp, spd:2, isBoss:true, moveTick:0, seed:Math.random()*100});
        }

        // キャラクター毎に要素が全く被らない覚醒アルゴリズム (Lv1〜4)
        function applyUniqueAwakeAttacks() {
            let a = p.alv, id = p.cid;
            if(a===0) return;
            
            // 1:ニンジャ (毒と反射)
            if(id===1) {
                if(a>=1) p.spd = CHARS[1].spd * 1.3;
                if(a>=2 && frame%60===0) traps.push({x:p.x, y:p.y, type:'poison', life:150, size:40});
                if(a>=3) p.atk = CHARS[1].atk * 1.5;
                if(a>=4 && frame%120===0) for(let i=0;i<8;i++) bList.push({x:p.x,y:p.y,vx:Math.cos(i)*12,vy:Math.sin(i)*12,dmg:p.atk,isE:false,bounce:4});
            }
            // 2:タンク (無敵と衝撃波)
            if(id===2) {
                if(a>=1) p.maxHp = CHARS[2].hp * 1.5;
                if(a>=2 && frame%60===0) bList.push({x:p.x,y:p.y,vx:0,vy:0,size:120,dmg:p.atk,isE:false,life:10,nova:true});
                if(a>=3) p.atk = CHARS[2].atk * 1.5;
                if(a>=4) p.shield = 100; // 常にシールド供給
            }
            // 3:スナイパ (爆発と貫通レーザー)
            if(id===3) {
                if(a>=1) p.shots = 2;
                if(a>=2 && frame%90===0) bList.push({x:p.x,y:p.y,vx:0,vy:-20,dmg:p.atk*2,isE:false,explosive:true,size:8});
                if(a>=3) p.atk = CHARS[3].atk * 1.5;
                if(a>=4 && frame%120===0) bList.push({x:p.x,y:p.y,vx:12,vy:0,dmg:p.atk*4,isE:false,pierce:true,life:100,size:15});
            }
            // 4:マグネ (ブラックホール)
            if(id===4) {
                if(a>=1) p.mag = 200;
                if(a>=2) p.mag = 400;
                if(a>=3) p.atk = CHARS[4].atk * 2;
                if(a>=4 && frame%240===0) traps.push({x:p.x, y:p.y, type:'blackhole', life:180, size:100});
            }
            // 5:パラディン (回復エリアと反射シールド)
            if(id===5) {
                if(a>=1 && frame%60===0) p.hp = Math.min(p.maxHp, p.hp+2);
                if(a>=2 && frame%200===0) traps.push({x:p.x, y:p.y, type:'heal', life:120, size:80});
                if(a>=3) p.maxHp = CHARS[5].hp * 1.5;
                if(a>=4 && frame%500===0) p.invincible = 180;
            }
            // 6:ガンナー (乱射とタレット)
            if(id===6) {
                if(a>=1) p.shots = 3;
                if(a>=2 && frame%90===0) for(let i=0;i<12;i++) bList.push({x:p.x,y:p.y,vx:Math.cos(i)*8,vy:Math.sin(i)*8,dmg:p.atk*0.5,isE:false});
                if(a>=3) p.shots = 5;
                if(a>=4 && frame%180===0) minions.push({x:p.x, y:p.y, type:'turret', life:300});
            }
            // 7:ヴァンピ (コウモリと吸収)
            if(id===7) {
                if(a>=1) p.lifestealChance = 0.1;
                if(a>=2 && frame%60===0) bList.push({x:p.x,y:p.y,vx:0,vy:0,dmg:p.atk,isE:false,homing:true,lifesteal:true});
                if(a>=3) p.maxHp += 0.1; // 常時微増
                if(a>=4 && frame%30===0) bList.push({x:p.x,y:p.y,vx:0,vy:0,dmg:p.atk*1.5,isE:false,homing:true,lifesteal:true});
            }
            // 8:サイボグ (ミサイルとドローン)
            if(id===8) {
                if(a>=1) p.atk = CHARS[8].atk * 1.3;
                if(a>=2 && frame%80===0) bList.push({x:p.x,y:p.y,vx:Math.random()*10-5,vy:-10,dmg:p.atk*3,isE:false,missile:true});
                if(a>=3) p.maxHp = CHARS[8].hp * 1.3;
                if(a>=4 && minions.filter(m=>m.type==='drone').length < 2) minions.push({x:p.x, y:p.y, type:'drone', life:9999});
            }
            // 9:エスパー (停止とマインドコントロール)
            if(id===9) {
                if(a>=1) p.mag = 200;
                if(a>=2 && frame%200===0) traps.push({x:p.x, y:p.y, type:'freeze', life:80, size:150});
                if(a>=3) p.atk = CHARS[9].atk * 1.5;
                if(a>=4 && frame%180===0) bList.push({x:p.x,y:p.y,vx:0,vy:0,dmg:0,isE:false,mindcontrol:true,size:200,life:5});
            }
            // 10:バーサカ (低HP強化と斬撃波)
            if(id===10) {
                if(a>=1) p.atk = CHARS[10].atk * 1.5;
                if(a>=2 && frame%40===0) bList.push({x:p.x,y:p.y,vx:12,vy:0,dmg:p.atk,isE:false,wave:true,size:20});
                if(a>=3) p.spd = CHARS[10].spd * (1 + (p.maxHp-p.hp)/p.maxHp);
                if(a>=4) p.atk = CHARS[10].atk * (1 + ((p.maxHp-p.hp)/p.maxHp)*3);
            }
            // 11:ゴースト (すり抜けと即死)
            if(id===11) {
                if(a>=1) p.spd = CHARS[11].spd * 1.3;
                if(a>=2 && frame%30===0) bList.push({x:p.x,y:p.y,vx:0,vy:-8,dmg:p.atk,isE:false,ghost:true,life:100});
                if(a>=3) p.evasion = 0.3;
                if(a>=4 && frame%120===0) bList.push({x:p.x,y:p.y,vx:0,vy:0,dmg:9999,isE:false,size:60,life:5,soulsteal:true});
            }
            // 12:サムライ (ダッシュと居合)
            if(id===12) {
                if(a>=1) p.atk = CHARS[12].atk * 1.3;
                if(a>=2 && frame%150===0) { p.x+=120; bList.push({x:p.x-60,y:p.y,vx:0,vy:0,dmg:p.atk*4,isE:false,size:100,life:10,slash:true}); }
                if(a>=3) p.crit = 0.5;
                if(a>=4 && frame%60===0) bList.push({x:p.x,y:p.y,vx:0,vy:0,dmg:p.atk*3,isE:false,size:150,life:5,slash:true});
            }
            // 13:リッチ (スケルトンと死のオーラ)
            if(id===13) {
                if(a>=1) p.mag = 200;
                if(a>=2 && frame%180===0) minions.push({x:p.x, y:p.y, type:'skeleton', life:400});
                if(a>=3) traps.push({x:p.x,y:p.y,type:'poison',life:2,size:80});
                if(a>=4 && frame%30===0) eList.forEach(e=>{if(e.hp<e.maxHp*0.2 && !e.isBoss) e.hp=0;});
            }
            // 14:ギャンブ (コインドロップとジャックポット)
            if(id===14) {
                if(a>=1) p.coinMod = 2;
                if(a>=2 && frame%60===0 && Math.random()<0.2) bList.push({x:p.x,y:p.y,vx:0,vy:-15,dmg:p.atk*10,isE:false,jackpot:true,size:20});
                if(a>=3) p.expMod = 2;
                if(a>=4) p.evasion = 0.5; // コイントス回避
            }
            // 15:ドクター (リジェネと復活)
            if(id===15) {
                if(a>=1 && frame%30===0) p.hp = Math.min(p.maxHp, p.hp+1);
                if(a>=2 && frame%60===0) traps.push({x:p.x,y:p.y,type:'heal',life:30,size:60});
                if(a>=3) p.maxHp = CHARS[15].hp * 2;
                if(a>=4 && p.hp<=0 && !p.revived) { p.hp=p.maxHp; p.revived=true; p.invincible=180; }
            }
            // 16:アーチャ (地雷と矢の雨)
            if(id===16) {
                if(a>=1) p.spd = CHARS[16].spd * 1.2;
                if(a>=2 && frame%90===0) traps.push({x:p.x, y:p.y, type:'mine', life:600, size:25});
                if(a>=3) p.shots = 4;
                if(a>=4 && frame%150===0) for(let i=0;i<10;i++) bList.push({x:p.x+(Math.random()*200-100),y:p.y-300,vx:0,vy:15,dmg:p.atk*2,isE:false});
            }
            // 17:エイリア (ワープと敵消去)
            if(id===17) {
                if(a>=1) p.spd = CHARS[17].spd * 1.5;
                if(a>=2 && frame%200===0) { p.x=Math.random()*width; p.y=Math.random()*height; bList.push({x:p.x,y:p.y,vx:0,vy:0,dmg:p.atk*3,isE:false,size:150,life:20,nova:true}); }
                if(a>=3) p.atk = CHARS[17].atk * 1.5;
                if(a>=4 && frame%300===0) eList.forEach(e=>{if(!e.isBoss && Math.hypot(e.x-p.x,e.y-p.y)<200) e.hp=0;});
            }
            // 18:ドラゴン (メテオと火炎放射)
            if(id===18) {
                if(a>=1) p.atk = CHARS[18].atk * 1.3;
                if(a>=2 && frame%120===0) traps.push({x:Math.random()*width, y:Math.random()*height, type:'meteor', life:120, size:150});
                if(a>=3) p.maxHp = CHARS[18].hp * 1.5;
                if(a>=4 && frame%10===0) bList.push({x:p.x,y:p.y,vx:Math.cos(frame*0.1)*12,vy:Math.sin(frame*0.1)*12,dmg:p.atk,isE:false,pierce:true,life:40});
            }
        }

        function levelUpUI() {
            state = 'LEVELUP';
            document.getElementById('screen-levelup').classList.remove('hidden');
            let cont = document.getElementById('skill-container'); cont.innerHTML = "";
            let skills = [
                {n:"攻撃力UP", f:()=>p.atk+=10}, {n:"最大HP UP", f:()=>{p.maxHp+=50; p.hp+=50;}}, 
                {n:"連射数UP", f:()=>p.shots++}, {n:"磁石範囲UP", f:()=>p.mag+=50}
            ];
            skills.sort(()=>Math.random()-0.5).slice(0,3).forEach(s=>{
                let b = document.createElement('button'); b.className = 'skill-btn'; b.innerText = s.n;
                b.onclick = () => { s.f(); document.getElementById('screen-levelup').classList.add('hidden'); state='PLAYING'; loop(); };
                cont.appendChild(b);
            });
        }

        function update() {
            if(state !== 'PLAYING') return;
            frame++;
            if(frame%60===0) {
                time--;
                // ヒューマン(ID:0)の自動回復：最大HPの1/50に弱体化
                if(p.cid===0) p.hp = Math.min(p.maxHp, p.hp + p.maxHp / 50);
                if(time<=240 && !isBoss) spawnB();
                if(time<=0) end(true);
            }

            p.x += (tPos.x - p.x) * 0.1 * (p.spd/4);
            p.y += (tPos.y - p.y) * 0.1 * (p.spd/4);
            if(p.invincible) p.invincible--;

            // 基本射撃
            if(frame%20===0 && eList.length>0) {
                let t = eList[0]; let a = Math.atan2(t.y-p.y, t.x-p.x);
                for(let i=0; i<p.shots; i++) {
                    let off = (i - (p.shots-1)/2)*0.2;
                    bList.push({ x:p.x, y:p.y, vx:Math.cos(a+off)*10, vy:Math.sin(a+off)*10, life:60, dmg:p.atk, isE:false });
                }
            }

            applyUniqueAwakeAttacks();
            if(!isBoss && frame%30===0) spawnE();

            // トラップ
            for(let i=traps.length-1; i>=0; i--){
                let tr = traps[i]; tr.life--;
                if(tr.type==='blackhole') eList.forEach(e=>{ if(Math.hypot(e.x-tr.x, e.y-tr.y)<300){ e.x+=(tr.x-e.x)*0.06; e.y+=(tr.y-e.y)*0.06; }});
                if(tr.type==='freeze') eList.forEach(e=>{ if(Math.hypot(e.x-tr.x, e.y-tr.y)<tr.size) e.spd = 0; });
                if(tr.type==='poison' && frame%10===0) eList.forEach(e=>{ if(Math.hypot(e.x-tr.x, e.y-tr.y)<tr.size) e.hp -= p.atk*0.5; });
                if(tr.type==='heal' && Math.hypot(p.x-tr.x, p.y-tr.y)<tr.size) p.hp = Math.min(p.maxHp, p.hp+2);
                if(tr.type==='mine' && eList.some(e=>Math.hypot(e.x-tr.x,e.y-tr.y)<30)) { eList.forEach(e=>{if(Math.hypot(e.x-tr.x,e.y-tr.y)<120) e.hp-=p.atk*5;}); tr.life=0; }
                if(tr.type==='meteor' && tr.life===1) eList.forEach(e=>{if(Math.hypot(e.x-tr.x,e.y-tr.y)<tr.size) e.hp-=p.atk*12;});
                if(tr.life<=0) traps.splice(i,1);
            }

            // ミニオン
            for(let i=minions.length-1; i>=0; i--){
                let m = minions[i]; m.life--;
                if(m.type==='turret' && frame%15===0) bList.push({x:m.x, y:m.y, vx:Math.random()*12-6, vy:Math.random()*12-6, dmg:p.atk*0.8, isE:false, life:30});
                if(m.type==='skeleton') { m.x+=(eList[0]?eList[0].x-m.x:0)*0.03; m.y+=(eList[0]?eList[0].y-m.y:0)*0.03; eList.forEach(e=>{if(Math.hypot(e.x-m.x,e.y-m.y)<40)e.hp-=p.atk*0.5;}); }
                if(m.type==='drone') { let a=frame*0.05+i*Math.PI; m.x=p.x+Math.cos(a)*60; m.y=p.y+Math.sin(a)*60; if(frame%40===0&&eList[0]){ let ang=Math.atan2(eList[0].y-m.y,eList[0].x-m.x); bList.push({x:m.x,y:m.y,vx:Math.cos(ang)*15,vy:Math.sin(ang)*15,dmg:p.atk*2,isE:false}); } }
                if(m.life<=0) minions.splice(i,1);
            }

            // 弾
            for(let i=bList.length-1; i>=0; i--){
                let b = bList[i];
                if(b.homing && eList.length>0) { let t=eList[0]; let a=Math.atan2(t.y-b.y, t.x-b.x); b.vx=Math.cos(a)*10; b.vy=Math.sin(a)*10; }
                if(b.mindcontrol) { eList.forEach(e=>{if(Math.hypot(e.x-b.x,e.y-b.y)<b.size) e.hp-=p.atk*0.1;}); }
                b.x += b.vx; b.y += b.vy; b.life--;
                
                if(b.isE && Math.hypot(p.x-b.x, p.y-b.y) < p.size+5) {
                    if(!p.invincible && !(p.evasion && Math.random()<p.evasion)) {
                        if(p.shield>0) p.shield-=b.dmg; else p.hp -= b.dmg;
                    }
                    bList.splice(i, 1); if(p.hp<=0 && !p.revived) end(false); // ドクター復活処理はapplyUniqueで対応
                } else if(b.life<=0) bList.splice(i, 1);
            }

            // 敵（ボス不規則AI含む）
            for(let i=eList.length-1; i>=0; i--){
                let e = eList[i]; e.moveTick++;
                let a = Math.atan2(p.y-e.y, p.x-e.x);
                
                if(e.isBoss) {
                    // ★ボス不規則AI: プレイヤーに向かいつつサイン波で蛇行＋一定間隔でダッシュ
                    let drift = Math.sin(e.moveTick * 0.05 + e.seed) * 2.0;
                    let dash = (e.moveTick % 150 < 30) ? 3 : 0.8; 
                    e.x += Math.cos(a + drift) * e.spd * dash;
                    e.y += Math.sin(a + drift) * e.spd * dash;

                    if(frame%80===0) for(let j=0; j<8; j++) bList.push({x:e.x, y:e.y, vx:Math.cos(j)*5, vy:Math.sin(j)*5, dmg:20, isE:true, life:100});
                } else {
                    e.x += Math.cos(a) * e.spd; e.y += Math.sin(a) * e.spd;
                }

                // 衝突判定
                for(let j=bList.length-1; j>=0; j--){
                    let b = bList[j];
                    if(!b.isE && Math.hypot(e.x-b.x, e.y-b.y) < e.size+(b.size||10)) {
                        let dmg = b.dmg; if(p.crit && Math.random()<p.crit) dmg*=2;
                        e.hp -= dmg;
                        
                        // ★ヒューマン(cid:0): ボスへのノックバック効果を1/2に減少
                        let kb = (p.cid===0 && e.isBoss) ? 0.5 : 1.0;
                        e.x += b.vx * 0.3 * kb; e.y += b.vy * 0.3 * kb;
                        
                        if(b.explosive) traps.push({x:e.x, y:e.y, type:'mine', life:2, size:60}); 
                        if(b.lifesteal && Math.random()< (p.lifestealChance||1)) p.hp = Math.min(p.maxHp, p.hp+2);
                        if(b.soulsteal && !e.isBoss) e.hp = 0;
                        
                        if(!b.pierce && !b.wave && !b.nova && !b.ghost && !b.slash && !b.mindcontrol) {
                            if(b.bounce>0){ b.bounce--; b.vx*=-1; } else { bList.splice(j, 1); }
                        }
                    }
                }

                if(e.hp<=0) {
                    if(e.isBoss) { end(true); return; }
                    gList.push({x:e.x, y:e.y}); eList.splice(i,1); 
                    saveData.coins += (p.coinMod ? 5*p.coinMod : 5);
                } else if(Math.hypot(p.x-e.x, p.y-e.y) < p.size+e.size) {
                    if(!p.invincible && !(p.evasion && Math.random()<p.evasion)) {
                        if(p.shield>0) p.shield-=2; else p.hp -= 2;
                    }
                    if(p.hp<=0 && !p.revived) end(false);
                }
            }

            for(let i=gList.length-1; i>=0; i--) {
                let g = gList[i];
                if(Math.hypot(p.x-g.x, p.y-g.y) < p.mag) { g.x+=(p.x-g.x)*0.15; g.y+=(p.y-g.y)*0.15; }
                if(Math.hypot(p.x-g.x, p.y-g.y) < 20) { 
                    p.exp += (p.expMod ? 1*p.expMod : 1); 
                    gList.splice(i,1); 
                    if(p.exp>=p.max){ p.lv++; p.exp=0; p.max+=2; levelUpUI(); } 
                }
            }

            document.getElementById('timer').innerText = Math.floor(time/60) + ":" + String(time%60).padStart(2,'0');
            document.getElementById('exp-bar').style.width = (p.exp/p.max*100) + "%";
            document.getElementById('ui-level').innerText = p.lv;
        }

        function draw() {
            ctx.fillStyle = "#05050a"; ctx.fillRect(0, 0, width, height);
            traps.forEach(t => { 
                ctx.fillStyle = t.type==='poison'?"rgba(0,150,0,0.4)":t.type==='heal'?"rgba(0,255,100,0.3)":t.type==='freeze'?"rgba(0,100,255,0.2)":t.type==='blackhole'?"rgba(50,0,100,0.7)":"rgba(255,50,0,0.5)";
                ctx.beginPath(); ctx.arc(t.x, t.y, t.size, 0, Math.PI*2); ctx.fill(); 
            });
            gList.forEach(g => { ctx.fillStyle = "#0f8"; ctx.fillRect(g.x-4, g.y-4, 8, 8); });
            minions.forEach(m => { ctx.fillStyle = m.type==='drone'?"#0ff":"#aaa"; ctx.fillRect(m.x-10, m.y-10, 20, 20); });
            bList.forEach(b => { 
                ctx.fillStyle = b.isE ? "#f0f" : "#ffcc00"; 
                if(b.wave||b.slash||b.nova||b.mindcontrol) ctx.fillStyle="rgba(255,255,255,0.4)";
                ctx.beginPath(); ctx.arc(b.x, b.y, b.size||5, 0, Math.PI*2); ctx.fill(); 
            });
            eList.forEach(e => {
                ctx.fillStyle = e.isBoss ? "#f00" : "#f44";
                ctx.beginPath(); ctx.arc(e.x, e.y, e.size, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "red"; ctx.fillRect(e.x-e.size, e.y-e.size-10, e.size*2*(e.hp/e.maxHp), 5);
            });
            
            ctx.fillStyle = p.invincible ? "#fff" : (p.shield>0 ? "#0ff" : p.color);
            ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = "#fff"; ctx.stroke();
            ctx.fillStyle = "#0f0"; ctx.fillRect(p.x-20, p.y+20, 40*(p.hp/p.maxHp), 5);
        }

        function end(win) {
            state = 'RES';
            document.getElementById('ui-layer').classList.add('hidden');
            document.getElementById('screen-result').classList.remove('hidden');
            document.getElementById('res-title').innerText = win ? "STAGE CLEAR" : "GAME OVER";
            document.getElementById('res-title').style.color = win ? "#0f0" : "#f00";
            
            let rew = win ? (isRaid ? 5000 : 1000) : 100;
            if(win && isRaid) saveData.awakeData[raidId] = (saveData.awakeData[raidId]||0) + 1;
            if(win && !isRaid && stage === saveData.unlockedStage && stage<30) saveData.unlockedStage++;
            saveData.coins += rew; document.getElementById('res-coins').innerText = rew; save();
        }

        function loop() { if(state === 'PLAYING') { update(); draw(); } if(state !== 'RES') requestAnimationFrame(loop); }
        window.addEventListener('mousemove', e => { tPos.x = e.clientX; tPos.y = e.clientY; });
        window.addEventListener('touchmove', e => { tPos.x = e.touches[0].clientX; tPos.y = e.touches[0].clientY; });
        document.getElementById('btn-restart').onclick = openHome;

        load();
    </script>
</body>
</html>
