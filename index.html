<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ultimate Survivor RPG</title>
    <style>
        :root {
            --bg-dark: #1a1a2e;
            --panel-bg: #16213e;
            --accent: #e94560;
            --text: #ffffff;
            --gold: #f1c40f;
        }
        body {
            margin: 0; overflow: hidden; background: var(--bg-dark);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: var(--text);
            touch-action: none; user-select: none;
        }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; }
        .screen { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; background: var(--bg-dark); }
        .active { display: flex; }
        
        /* ホーム画面スタイル */
        .panel { background: var(--panel-bg); padding: 20px; border-radius: 15px; border: 2px solid var(--accent); width: 85%; max-width: 400px; text-align: center; }
        button { 
            background: var(--accent); color: white; border: none; padding: 12px 25px; 
            margin: 10px; border-radius: 25px; font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        button:disabled { background: #555; cursor: not-allowed; }
        .status-bar { display: flex; justify-content: space-around; width: 100%; background: #0f3460; padding: 10px 0; }

        /* スキル選択 */
        #skill-selection { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80%; display: none; z-index: 100; }
        .skill-card { background: #0f3460; border: 2px solid var(--gold); padding: 15px; margin: 10px; border-radius: 10px; text-align: center; }

        #canvas { display: block; background: #0f0f1b; }
        #joystick { position: absolute; bottom: 40px; left: 40px; width: 100px; height: 100px; background: rgba(255,255,255,0.1); border-radius: 50%; display: none; }
        #joystick-stick { position: absolute; top: 30px; left: 30px; width: 40px; height: 40px; background: rgba(255,255,255,0.4); border-radius: 50%; }
    </style>
</head>
<body>

<div id="ui-layer">
    <!-- 1. 名前入力画面 -->
    <div id="name-screen" class="screen">
        <div class="panel">
            <h2>冒険者の名前を教えてください</h2>
            <input type="text" id="player-name-input" placeholder="名前を入力..." style="padding: 10px; border-radius: 5px; width: 80%;">
            <br>
            <button onclick="saveName()">開始する</button>
        </div>
    </div>

    <!-- 2. ホーム画面 -->
    <div id="home-screen" class="screen">
        <div class="status-bar">
            <span>👤 <span id="display-name">---</span></span>
            <span>💎 <span id="display-crystals">0</span></span>
        </div>
        <h1>SURVIVOR HOME</h1>
        <div class="panel">
            <button onclick="showScreen('stage-screen')">ステージ選択</button><br>
            <button onclick="showScreen('gacha-screen')">ガチャ (100💎)</button><br>
            <button onclick="showScreen('char-screen')">キャラ選択</button>
        </div>
    </div>

    <!-- 3. ステージ選択 -->
    <div id="stage-screen" class="screen">
        <h2>ステージ選択</h2>
        <div id="stage-list" style="display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; max-height: 60vh; overflow-y: auto; padding: 10px;"></div>
        <button onclick="showScreen('home-screen')">戻る</button>
    </div>

    <!-- 4. ガチャ画面 -->
    <div id="gacha-screen" class="screen">
        <div class="panel">
            <h2>キャラガチャ</h2>
            <p>100クリスタルで新しい仲間を獲得！</p>
            <div id="gacha-result" style="height: 50px; font-weight: bold; color: var(--gold);"></div>
            <button id="gacha-btn" onclick="pullGacha()">ガチャを回す</button>
            <button onclick="showScreen('home-screen')">戻る</button>
        </div>
    </div>

    <!-- 5. キャラ選択 -->
    <div id="char-screen" class="screen">
        <h2>使用キャラ選択</h2>
        <div id="char-list" style="display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; padding: 10px;"></div>
        <button onclick="showScreen('home-screen')">戻る</button>
    </div>

    <!-- 6. ゲーム中UI -->
    <div id="game-ui" style="display:none; position: absolute; top: 10px; left: 10px; width: 95%; pointer-events: none;">
        <div id="exp-bar-bg" style="width: 100%; height: 10px; background: #333; border-radius: 5px;">
            <div id="exp-bar-fill" style="width: 0%; height: 100%; background: #9b59b6; border-radius: 5px;"></div>
        </div>
        <div style="display: flex; justify-content: space-between;">
            <span>Lv: <span id="game-lv">1</span></span>
            <span>Time: <span id="game-time">0:00</span></span>
        </div>
        <div id="game-hp-bg" style="width: 150px; height: 15px; background: #333; margin-top: 5px; border: 1px solid #fff;">
            <div id="game-hp-fill" style="width: 100%; height: 100%; background: #2ecc71;"></div>
        </div>
    </div>

    <!-- 7. スキル選択ポップアップ -->
    <div id="skill-selection">
        <div class="panel" style="width: 100%;">
            <h3>スキルアップグレード！</h3>
            <div id="skill-choices"></div>
        </div>
    </div>
</div>

<canvas id="canvas"></canvas>
<div id="joystick"><div id="joystick-stick"></div></div>

<script>
/**
 * 1. データ定義 & セーブシステム
 */
const CHARACTERS = [
    { id: 0, name: "見習い騎士", skill: "バランス型", hp: 100, speed: 3, dmg: 1 },
    { id: 1, name: "韋駄天の風", skill: "移動速度+50%", hp: 80, speed: 4.5, dmg: 0.8 },
    { id: 2, name: "重戦車", skill: "HP2倍・鈍足", hp: 200, speed: 2, dmg: 1.5 },
    { id: 3, name: "火炎魔導師", skill: "攻撃範囲UP", hp: 70, speed: 2.8, dmg: 2 },
    { id: 4, name: "暗殺者", skill: "攻撃速度UP", hp: 80, speed: 4, dmg: 1.2 },
    { id: 5, name: "狂戦士", skill: "超火力", hp: 120, speed: 2.5, dmg: 3 },
    { id: 6, name: "神官", skill: "自動回復", hp: 100, speed: 3, dmg: 0.7 },
    { id: 7, name: "サムライ", skill: "近接クリティカル", hp: 110, speed: 3.5, dmg: 1.8 },
    { id: 8, name: "氷の女王", skill: "敵鈍足化", hp: 90, speed: 3, dmg: 1.3 },
    { id: 9, name: "大砲使い", skill: "弾丸サイズ大", hp: 130, speed: 2.2, dmg: 2.5 },
    { id: 10, name: "聖騎士", skill: "防御力UP", hp: 180, speed: 2.5, dmg: 1 },
    { id: 11, name: "忍", skill: "多弾発射", hp: 85, speed: 4.2, dmg: 0.9 },
    { id: 12, name: "魔王の息子", skill: "全ステータス強化", hp: 150, speed: 3.5, dmg: 2 },
    { id: 13, name: "メカニック", skill: "連射性能極振り", hp: 100, speed: 3, dmg: 0.6 },
    { id: 14, name: "仙人", skill: "経験値効率UP", hp: 80, speed: 3, dmg: 1 },
    { id: 15, name: "死神", skill: "撃破時HP吸収", hp: 110, speed: 3.2, dmg: 1.7 },
    { id: 16, name: "勇者", skill: "全ての始まり", hp: 140, speed: 3.3, dmg: 1.5 },
    { id: 17, name: "ヴァンパイア", skill: "夜間強化", hp: 100, speed: 3.5, dmg: 1.4 },
    { id: 18, name: "龍騎士", skill: "高耐久・高火力", hp: 200, speed: 2.8, dmg: 2.2 },
    { id: 19, name: "ギャンブラー", skill: "ダメージ変動", hp: 100, speed: 3.2, dmg: 1.2 }
];

let userData = {
    name: "",
    crystals: 0,
    unlockedStage: 1,
    clearedStages: [], // 初回クリア判定用
    ownedChars: [0], // 最初はID:0のみ
    selectedCharId: 0
};

function loadData() {
    const saved = localStorage.getItem('survivor_save');
    if (saved) {
        userData = JSON.parse(saved);
        if (!userData.name) showScreen('name-screen');
        else showScreen('home-screen');
    } else {
        showScreen('name-screen');
    }
    updateHomeUI();
}

function saveData() {
    localStorage.setItem('survivor_save', JSON.stringify(userData));
    updateHomeUI();
}

function saveName() {
    const val = document.getElementById('player-name-input').value;
    if (val) {
        userData.name = val;
        saveData();
        showScreen('home-screen');
    }
}

/**
 * 2. UI管理
 */
function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    if(id === 'stage-screen') renderStages();
    if(id === 'char-screen') renderChars();
}

function updateHomeUI() {
    document.getElementById('display-name').textContent = userData.name;
    document.getElementById('display-crystals').textContent = userData.crystals;
}

function renderStages() {
    const container = document.getElementById('stage-list');
    container.innerHTML = '';
    for (let i = 1; i <= 50; i++) {
        const btn = document.createElement('button');
        btn.textContent = i;
        btn.disabled = i > userData.unlockedStage;
        btn.onclick = () => startLevel(i);
        container.appendChild(btn);
    }
}

function renderChars() {
    const container = document.getElementById('char-list');
    container.innerHTML = '';
    CHARACTERS.forEach(c => {
        if (userData.ownedChars.includes(c.id)) {
            const btn = document.createElement('button');
            btn.innerHTML = `${c.name}<br><small>${c.skill}</small>`;
            btn.style.border = userData.selectedCharId === c.id ? "3px solid gold" : "none";
            btn.onclick = () => { userData.selectedCharId = c.id; saveData(); renderChars(); };
            container.appendChild(btn);
        }
    });
}

function pullGacha() {
    if (userData.crystals < 100) return alert("クリスタルが足りません！");
    userData.crystals -= 100;
    const locked = CHARACTERS.filter(c => !userData.ownedChars.includes(c.id));
    if (locked.length === 0) {
        document.getElementById('gacha-result').textContent = "全てのキャラを所持しています！(100💎返却)";
        userData.crystals += 100;
    } else {
        const newChar = locked[Math.floor(Math.random() * locked.length)];
        userData.ownedChars.push(newChar.id);
        document.getElementById('gacha-result').textContent = "新キャラ入手: " + newChar.name;
    }
    saveData();
}

/**
 * 3. ゲームエンジン
 */
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let gameActive = false;
let currentStage = 1;
let enemies = [], projectiles = [], exps = [], boss = null;
let p_obj, timer, startTime, lastEnemySpawn = 0;

function startLevel(num) {
    currentStage = num;
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('game-ui').style.display = 'block';
    document.getElementById('joystick').style.display = 'block';
    
    // キャンバス初期化
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    
    // プレイヤー初期化
    const charBase = CHARACTERS.find(c => c.id === userData.selectedCharId);
    p_obj = {
        x: canvas.width/2, y: canvas.height/2,
        r: 15, lv: 1, exp: 0, expNext: 5,
        hp: charBase.hp, maxHp: charBase.hp,
        speed: charBase.speed, dmg: charBase.dmg,
        atkSpd: 800, lastAtk: 0
    };
    
    enemies = []; projectiles = []; exps = []; boss = null;
    gameActive = true;
    startTime = Date.now();
    requestAnimationFrame(gameLoop);
}

// 敵生成（時間が経つほど・ステージが高いほど強く）
function spawnEnemy() {
    const elapsed = (Date.now() - startTime) / 1000;
    const diffFactor = 1 + (currentStage * 0.1) + (elapsed / 60);
    
    const side = Math.floor(Math.random() * 4);
    let ex, ey;
    if(side===0){ ex = Math.random()*canvas.width; ey = -20; }
    else if(side===1){ ex = canvas.width+20; ey = Math.random()*canvas.height; }
    else if(side===2){ ex = Math.random()*canvas.width; ey = canvas.height+20; }
    else { ex = -20; ey = Math.random()*canvas.height; }

    enemies.push({
        x: ex, y: ey, r: 12,
        // 最初は一撃(HP1)、5分に近づくほど強くなる
        hp: Math.max(1, Math.floor(elapsed / 20 * currentStage)),
        speed: 1 + Math.random() + (currentStage * 0.05),
        color: `hsl(${200 - (elapsed/2)}, 70%, 50%)`
    });
}

function spawnBoss() {
    boss = {
        x: canvas.width/2, y: -50, r: 40,
        hp: 50 * currentStage, maxHp: 50 * currentStage,
        speed: 1.5,
        type: currentStage % 3, // ステージにより攻撃パターン変更
        lastAction: 0
    };
}

/**
 * ゲームループ
 */
function gameLoop() {
    if (!gameActive) return;
    const now = Date.now();
    const elapsed = (now - startTime) / 1000;
    
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // タイマー更新
    const mins = Math.floor(elapsed / 60);
    const secs = Math.floor(elapsed % 60);
    document.getElementById('game-time').textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
    
    // 5分(300秒)でボス出現
    if (elapsed >= 300 && !boss) spawnBoss();

    // プレイヤー移動（バーチャルスティック）
    if (isDragging) {
        const dist = Math.hypot(dragX, dragY);
        if (dist > 0) {
            p_obj.x += (dragX / dist) * p_obj.speed;
            p_obj.y += (dragY / dist) * p_obj.speed;
        }
    }
    // 描画：プレイヤー
    ctx.fillStyle = "#3498db";
    ctx.beginPath(); ctx.arc(p_obj.x, p_obj.y, p_obj.r, 0, Math.PI*2); ctx.fill();

    // 自動攻撃
    if (now - p_obj.lastAtk > p_obj.atkSpd) {
        let target = boss || enemies[0];
        if (target) {
            const angle = Math.atan2(target.y - p_obj.y, target.x - p_obj.x);
            projectiles.push({ x: p_obj.x, y: p_obj.y, vx: Math.cos(angle)*8, vy: Math.sin(angle)*8, r: 5 });
            p_obj.lastAtk = now;
        }
    }

    // 弾更新
    projectiles.forEach((p, i) => {
        p.x += p.vx; p.y += p.vy;
        ctx.fillStyle = varColor('--gold');
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
        if(p.x<0||p.x>canvas.width||p.y<0||p.y>canvas.height) projectiles.splice(i,1);
    });

    // 敵更新
    enemies.forEach((e, i) => {
        const dist = Math.hypot(e.x - p_obj.x, e.y - p_obj.y);
        const angle = Math.atan2(p_obj.y - e.y, p_obj.x - e.x);
        e.x += Math.cos(angle) * e.speed;
        e.y += Math.sin(angle) * e.speed;
        
        ctx.fillStyle = e.color;
        ctx.beginPath(); ctx.arc(e.x, e.y, e.r, 0, Math.PI*2); ctx.fill();

        // 接触ダメージ
        if (dist < e.r + p_obj.r) p_obj.hp -= 0.5;

        // 弾命中
        projectiles.forEach((pj, pi) => {
            if (Math.hypot(e.x - pj.x, e.y - pj.y) < e.r + pj.r) {
                e.hp -= p_obj.dmg;
                projectiles.splice(pi, 1);
                if (e.hp <= 0) {
                    exps.push({x: e.x, y: e.y, r: 4});
                    enemies.splice(i, 1);
                }
            }
        });
    });

    // ボス更新
    if (boss) {
        const dist = Math.hypot(boss.x - p_obj.x, boss.y - p_obj.y);
        const angle = Math.atan2(p_obj.y - boss.y, p_obj.x - boss.x);
        boss.x += Math.cos(angle) * boss.speed;
        boss.y += Math.sin(angle) * boss.speed;

        // ボス描画
        ctx.fillStyle = "#e94560";
        ctx.beginPath(); ctx.arc(boss.x, boss.y, boss.r, 0, Math.PI*2); ctx.fill();
        // HPバー
        ctx.fillStyle = "red"; ctx.fillRect(boss.x - 40, boss.y - 60, (boss.hp/boss.maxHp)*80, 5);

        projectiles.forEach((pj, pi) => {
            if (Math.hypot(boss.x - pj.x, boss.y - pj.y) < boss.r + pj.r) {
                boss.hp -= p_obj.dmg;
                projectiles.splice(pi, 1);
                if (boss.hp <= 0) victory();
            }
        });
        if (dist < boss.r + p_obj.r) p_obj.hp -= 1;
    }

    // 経験値取得
    exps.forEach((orb, i) => {
        ctx.fillStyle = "#9b59b6";
        ctx.beginPath(); ctx.arc(orb.x, orb.y, orb.r, 0, Math.PI*2); ctx.fill();
        if (Math.hypot(orb.x - p_obj.x, orb.y - p_obj.y) < p_obj.r + 20) {
            exps.splice(i, 1);
            gainExp(1);
        }
    });

    // 敵スポーン管理
    if (now - lastEnemySpawn > Math.max(200, 1000 - elapsed)) {
        spawnEnemy();
        lastEnemySpawn = now;
    }

    // UI更新
    document.getElementById('game-hp-fill').style.width = (p_obj.hp / p_obj.maxHp * 100) + "%";
    if (p_obj.hp <= 0) gameOver();

    requestAnimationFrame(gameLoop);
}

function gainExp(amt) {
    p_obj.exp += amt;
    document.getElementById('exp-bar-fill').style.width = (p_obj.exp / p_obj.expNext * 100) + "%";
    if (p_obj.exp >= p_obj.expNext) {
        p_obj.lv++;
        p_obj.exp = 0;
        p_obj.expNext += 5;
        document.getElementById('game-lv').textContent = p_obj.lv;
        showSkillSelection();
    }
}

function showSkillSelection() {
    gameActive = false;
    const div = document.getElementById('skill-selection');
    const container = document.getElementById('skill-choices');
    div.style.display = 'block';
    container.innerHTML = '';

    const skills = [
        { n: "攻撃力UP", f: () => p_obj.dmg += 0.5 },
        { n: "連射速度UP", f: () => p_obj.atkSpd *= 0.8 },
        { n: "移動速度UP", f: () => p_obj.speed += 0.5 },
        { n: "最大HP UP", f: () => { p_obj.maxHp += 20; p_obj.hp += 20; } }
    ];

    // 3つランダムに表示
    skills.sort(() => Math.random() - 0.5).slice(0,3).forEach(s => {
        const b = document.createElement('button');
        b.className = 'skill-card';
        b.textContent = s.n;
        b.onclick = () => {
            s.f();
            div.style.display = 'none';
            gameActive = true;
            requestAnimationFrame(gameLoop);
        };
        container.appendChild(b);
    });
}

function victory() {
    gameActive = false;
    alert("ステージクリア！");
    if (!userData.clearedStages.includes(currentStage)) {
        userData.crystals += 10;
        userData.clearedStages.push(currentStage);
        if (currentStage === userData.unlockedStage && userData.unlockedStage < 50) {
            userData.unlockedStage++;
        }
    }
    saveData();
    location.reload();
}

function gameOver() {
    gameActive = false;
    alert("ゲームオーバー...");
    location.reload();
}

/**
 * ジョイスティック処理
 */
let isDragging = false, dragX = 0, dragY = 0, startX, startY;
const jBase = document.getElementById('joystick'), jStick = document.getElementById('joystick-stick');

window.addEventListener('touchstart', e => {
    isDragging = true;
    startX = e.touches[0].clientX; startY = e.touches[0].clientY;
    jBase.style.left = (startX - 50) + "px"; jBase.style.top = (startY - 50) + "px";
});
window.addEventListener('touchmove', e => {
    if(!isDragging) return;
    dragX = e.touches[0].clientX - startX;
    dragY = e.touches[0].clientY - startY;
    const limit = 40, d = Math.hypot(dragX, dragY);
    if(d > limit) { dragX *= limit/d; dragY *= limit/d; }
    jStick.style.transform = `translate(${dragX}px, ${dragY}px)`;
});
window.addEventListener('touchend', () => { isDragging = false; dragX = 0; dragY = 0; });

function varColor(name) { return getComputedStyle(document.documentElement).getPropertyValue(name); }

// 起動
loadData();

</script>
</body>
</html>
