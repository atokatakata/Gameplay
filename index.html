<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>JS SURVIVOR - SKILL UPDATE</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050510; font-family: sans-serif; touch-action: none; color: white; user-select: none; }
        canvas { display: block; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.85); z-index: 20; }
        .hidden { display: none !important; }
        h1 { font-size: 40px; color: #ffcc00; margin-bottom: 10px; text-shadow: 0 0 20px #ffcc00; text-align: center;}
        h2 { color: #00ffcc; }
        button, select, input { font-size: 18px; padding: 12px 24px; margin: 8px; border-radius: 8px; background: #1a1a2e; color: white; border: 2px solid #444; cursor: pointer; text-align: center; }
        button:hover { border-color: #00ffcc; background: #2a2a4e; }
        button:disabled { border-color: #333; color: #555; cursor: not-allowed; }
        
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; padding: 10px; box-sizing: border-box; pointer-events: none; z-index: 10; }
        .stats { display: flex; justify-content: space-between; font-size: 18px; font-weight: bold; text-shadow: 2px 2px 0 #000; }
        #exp-bg { width: 100%; height: 8px; background: #222; border-radius: 4px; margin-top: 8px; border: 1px solid #333; }
        #exp-bar { width: 0%; height: 100%; background: #00ffcc; transition: width 0.1s; }
        
        .skill-card { background: #222; border: 2px solid #444; border-radius: 10px; padding: 15px; margin: 5px; width: 280px; text-align: center; cursor: pointer; pointer-events: auto; }
        .skill-card:hover { border-color: #00ffcc; background: #333; }
        
        #gacha-result { font-size: 32px; font-weight: bold; color: #ff00ff; text-shadow: 0 0 10px #ff00ff; margin: 20px 0; display: none; }
        .char-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; max-height: 50vh; overflow-y: auto; padding: 10px; }
        .char-box { border: 2px solid #555; border-radius: 8px; padding: 10px; text-align: center; cursor: pointer; background: #111; }
        .char-box.owned { border-color: #00ffcc; }
        .char-box.selected { background: #00ffcc; color: black; font-weight: bold; }
        
        #boss-notice { position: absolute; top: 20%; width: 100%; text-align: center; font-size: 50px; color: red; font-weight: bold; text-shadow: 2px 2px 0 #000; display: none; z-index: 30; }
        #liberation-ui { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); font-size: 24px; color: #ff0000; font-weight: bold; text-shadow: 0 0 10px #000; }
    </style>
</head>
<body>

    <div id="screen-login" class="overlay">
        <h1>JS SURVIVOR</h1>
        <p>プレイヤー名を入力してください</p>
        <input type="text" id="player-name-input" placeholder="名前" maxlength="10">
        <button id="btn-login">ゲーム開始</button>
    </div>

    <div id="screen-home" class="overlay hidden">
        <h1>HOME</h1>
        <p>ようこそ、<span id="disp-name" style="color:#00ffcc;"></span> さん!</p>
        <p>所持コイン: <span id="disp-coins" style="color:#ffcc00; font-size:24px;">0</span> C</p>
        <div>
            <select id="stage-select"></select>
            <button id="btn-start">通常出撃</button>
            <button id="btn-raid-menu" style="border-color:#ff00ff; color:#ffccff;">レイドバトル (覚醒)</button>
        </div>
        <div style="margin-top: 15px;">
            <button id="btn-gacha-menu">ガチャを引く (1000C)</button>
            <button id="btn-char-menu">キャラ変更</button>
        </div>
    </div>

    <div id="screen-chars" class="overlay hidden">
        <h2>キャラクター選択</h2>
        <div id="char-list" class="char-grid"></div>
        <button id="btn-close-chars">ホームに戻る</button>
    </div>

    <div id="screen-raid" class="overlay hidden">
        <h2 style="color:#ff00ff;">挑む覚醒ボスを選択</h2>
        <div id="raid-char-list" class="char-grid"></div>
        <button id="btn-close-raid">ホームに戻る</button>
    </div>

    <div id="screen-gacha" class="overlay hidden">
        <h1 style="color:#ff00ff;">CHARACTER GACHA</h1>
        <p>1回 1000 コイン</p>
        <button id="btn-pull-gacha">ガチャを引く!</button>
        <div id="gacha-result"></div>
        <button id="btn-close-gacha">ホームに戻る</button>
    </div>

    <div id="screen-levelup" class="overlay hidden">
        <h2>LEVEL UP!</h2>
        <div id="skill-container"></div>
    </div>

    <div id="screen-result" class="overlay hidden">
        <h1 id="res-title">FINISH</h1>
        <p style="font-size: 24px;">獲得コイン: <span id="res-coins" style="color:#ffcc00;">0</span> C</p>
        <button id="btn-restart">HOME</button>
    </div>

    <div id="ui-layer" class="hidden">
        <div class="stats">
            <div>Lv.<span id="ui-level">1</span></div>
            <div id="timer" style="color:#ff4444">05:00</div>
            <div id="ui-char-name" style="color:#00ffcc;"></div>
        </div>
        <div id="exp-bg"><div id="exp-bar"></div></div>
        <div id="liberation-ui"></div>
    </div>

    <div id="boss-notice">WARNING: HUGE BOSS!!</div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        function resize() { width = window.innerWidth; height = window.innerHeight; canvas.width = width; canvas.height = height; }
        window.addEventListener('resize', resize); resize();

        let saveData = { name: "", coins: 0, unlockedStage: 1, chars: [0], selectedChar: 0, awakenedChars: [], rookieAwakeStage: 0 };
        
        const CHAR_DATA = [
            { id: 0, name: "ルーキー", color: "#09f", hp: 150, spd: 4.2, atk: 25, multi: 1, orb: 0, mag: 120, desc: "進化する者" },
            { id: 1, name: "ニンジャ", color: "#333", hp: 100, spd: 6.0, atk: 20, multi: 1, orb: 0, mag: 100, desc: "定期的に八方クナイ" },
            { id: 2, name: "タンク", color: "#8b4513", hp: 400, spd: 2.8, atk: 30, multi: 1, orb: 0, mag: 150, desc: "確率でダメ無効＆反射" },
            { id: 3, name: "スナイパ", color: "#0f0", hp: 120, spd: 3.8, atk: 60, multi: 1, orb: 0, mag: 80, desc: "貫通レーザー発射" },
            { id: 4, name: "マグネ", color: "#f0f", hp: 150, spd: 4.0, atk: 22, multi: 1, orb: 0, mag: 400, desc: "回収範囲が広がり続ける" },
            { id: 5, name: "パラディン", color: "#ffd700", hp: 200, spd: 3.5, atk: 25, multi: 1, orb: 1, mag: 120, desc: "時間経過でバリア復活" },
            { id: 6, name: "ガンナー", color: "#ff4500", hp: 140, spd: 4.2, atk: 18, multi: 3, orb: 0, mag: 100, desc: "通常弾の連射速度が2倍" },
            { id: 7, name: "ヴァンピィ", color: "#800080", hp: 150, spd: 4.5, atk: 25, multi: 1, orb: 0, mag: 120, desc: "敵撃破でHP微回復" },
            { id: 8, name: "サイボーグ", color: "#708090", hp: 250, spd: 3.5, atk: 40, multi: 1, orb: 0, mag: 100, desc: "HPが減るほど攻撃UP" },
            { id: 9, name: "エスパー", color: "#00ffff", hp: 120, spd: 4.8, atk: 20, multi: 1, orb: 3, mag: 150, desc: "被弾時に念動波で反撃" },
            { id: 10, name: "バーサーカ", color: "#b22222", hp: 180, spd: 4.8, atk: 55, multi: 1, orb: 0, mag: 90, desc: "敵を倒すほど攻撃力無限UP" },
            { id: 11, name: "ゴースト", color: "#e6e6fa", hp: 90, spd: 5.5, atk: 22, multi: 1, orb: 0, mag: 250, desc: "ギミックダメージ無効" },
            { id: 12, name: "サムライ", color: "#cd5c5c", hp: 160, spd: 4.5, atk: 45, multi: 1, orb: 0, mag: 110, desc: "定期的に広範囲の斬撃" },
            { id: 13, name: "リッチ", color: "#483d8b", hp: 130, spd: 4.0, atk: 35, multi: 2, orb: 1, mag: 130, desc: "敵撃破時、確率で魔法弾" },
            { id: 14, name: "ギャンブラ", color: "#ff1493", hp: 150, spd: 4.2, atk: 15, multi: 1, orb: 0, mag: 150, desc: "所持コインが多いほど高火力" },
            { id: 15, name: "ドクター", color: "#ffffff", hp: 180, spd: 3.8, atk: 20, multi: 1, orb: 0, mag: 100, desc: "毎秒HPが自動回復" },
            { id: 16, name: "アーチャー", color: "#228b22", hp: 140, spd: 4.6, atk: 35, multi: 2, orb: 0, mag: 110, desc: "ホーミングアロー" },
            { id: 17, name: "エイリアン", color: "#7fff00", hp: 150, spd: 5.0, atk: 30, multi: 1, orb: 0, mag: 80, desc: "定期的にワープ＆爆弾設置" },
            { id: 18, name: "ドラゴン", color: "#dc143c", hp: 300, spd: 4.0, atk: 50, multi: 1, orb: 1, mag: 100, desc: "前方に炎のブレスを吐く" },
            { id: 19, name: "カミサマ", color: "#ffea00", hp: 500, spd: 5.5, atk: 70, multi: 3, orb: 3, mag: 300, desc: "たまに画面全域に神の雷" }
        ];

        const ROOKIE_NAMES = ["ルーキー", "ヒューマン", "ヒューマン v1", "ヒューマン v2", "ヒューマン v3", "ヒューマン v4"];

        function loadData() {
            let d = localStorage.getItem('jsSurvivorUltraSave');
            if(d) saveData = JSON.parse(d);
            if(!saveData.awakenedChars) saveData.awakenedChars = [];
            if(saveData.rookieAwakeStage === undefined) saveData.rookieAwakeStage = 0;
            if(saveData.name) { document.getElementById('screen-login').classList.add('hidden'); openHome(); }
        }
        function saveGame() { localStorage.setItem('jsSurvivorUltraSave', JSON.stringify(saveData)); }

        let state = 'LOGIN', playTime = 300, scoreCoins = 0, frameCount = 0;
        let isBossActive = false, currentStage = 1;
        let player, enemies, bullets, gems, orbits, damageTexts, hazards;
        let targetPos = { x: 0, y: 0 };
        let isRaidMode = false, raidTargetCharId = 0, raidTargetRookieStage = 0;

        let libTimer = 0, libCool = 0; 

        const skillPool = [
            { id: 'multi', name: '連射', desc: '弾数+1' },
            { id: 'power', name: '威力', desc: 'ダメージ+10' },
            { id: 'orbit', name: 'バリア', desc: '周囲を回る守護石' },
            { id: 'magnet', name: '磁石', desc: '回収範囲UP' },
            { id: 'speed', name: '加速', desc: '移動速度UP' },
            { id: 'heal', name: '回復', desc: 'HPを50%回復' }
        ];

        document.getElementById('btn-login').onclick = () => {
            let n = document.getElementById('player-name-input').value.trim();
            if(!n) return alert("名前を入力してください!");
            saveData.name = n; saveGame();
            document.getElementById('screen-login').classList.add('hidden'); openHome();
        };

        function getCharDisplayName(id) {
            if(id === 0) return ROOKIE_NAMES[saveData.rookieAwakeStage];
            let n = CHAR_DATA[id].name;
            if(saveData.awakenedChars.includes(id)) n += " ★覚醒";
            return n;
        }

        function openHome() {
            state = 'HOME';
            document.getElementById('disp-name').innerText = saveData.name;
            document.getElementById('disp-coins').innerText = saveData.coins;
            
            const select = document.getElementById('stage-select');
            select.innerHTML = "";
            for(let i=1; i<=30; i++) {
                let opt = document.createElement('option');
                opt.value = i; opt.innerText = `STAGE ${i}`;
                if(i > saveData.unlockedStage) opt.disabled = true;
                select.appendChild(opt);
            }
            select.value = Math.min(saveData.unlockedStage, 30);
            
            document.querySelectorAll('.overlay').forEach(e => e.classList.add('hidden'));
            document.getElementById('screen-home').classList.remove('hidden');
        }

        document.getElementById('btn-char-menu').onclick = () => {
            document.getElementById('screen-home').classList.add('hidden');
            const list = document.getElementById('char-list');
            list.innerHTML = "";
            CHAR_DATA.forEach(c => {
                let isOwned = saveData.chars.includes(c.id);
                let div = document.createElement('div');
                div.className = `char-box ${isOwned ? 'owned' : ''} ${saveData.selectedChar === c.id ? 'selected' : ''}`;
                div.innerHTML = `<strong>${isOwned ? getCharDisplayName(c.id) : '???'}</strong><br><span style="font-size:14px;">${isOwned ? c.desc : '未解放'}</span>`;
                if(isOwned) div.onclick = () => { saveData.selectedChar = c.id; saveGame(); document.getElementById('btn-char-menu').click(); };
                list.appendChild(div);
            });
            document.getElementById('screen-chars').classList.remove('hidden');
        };
        document.getElementById('btn-close-chars').onclick = openHome;

        document.getElementById('btn-raid-menu').onclick = () => {
            document.getElementById('screen-home').classList.add('hidden');
            const list = document.getElementById('raid-char-list');
            list.innerHTML = "";
            CHAR_DATA.forEach(c => {
                if(saveData.chars.includes(c.id)) {
                    let div = document.createElement('div');
                    if(c.id === 0) {
                        let nextStage = saveData.rookieAwakeStage + 1;
                        if(nextStage > 5) {
                            div.className = 'char-box owned'; div.innerHTML = `<strong>ヒューマン</strong><br><span style="color:#f0f;">完全覚醒済み</span>`;
                        } else {
                            div.className = 'char-box'; div.innerHTML = `<strong>${ROOKIE_NAMES[nextStage]} 昇格戦</strong><br>未クリア`;
                            div.onclick = () => { if(confirm(`${ROOKIE_NAMES[nextStage]}への覚醒ボスに挑みますか？`)){ startRaid(0, nextStage); } };
                        }
                    } else {
                        let isAwakened = saveData.awakenedChars.includes(c.id);
                        div.className = `char-box ${isAwakened ? 'owned' : ''}`;
                        div.innerHTML = `<strong>${c.name}</strong><br>${isAwakened ? '<span style="color:#f0f;">★覚醒済み</span>' : '未覚醒'}`;
                        div.onclick = () => { if(confirm(`${c.name}の覚醒ボスに挑みますか？`)){ startRaid(c.id, 0); } };
                    }
                    list.appendChild(div);
                }
            });
            document.getElementById('screen-raid').classList.remove('hidden');
        };
        document.getElementById('btn-close-raid').onclick = openHome;

        document.getElementById('btn-gacha-menu').onclick = () => {
            document.getElementById('screen-home').classList.add('hidden');
            document.getElementById('gacha-result').style.display = 'none';
            document.getElementById('screen-gacha').classList.remove('hidden');
        };
        document.getElementById('btn-close-gacha').onclick = openHome;
        document.getElementById('btn-pull-gacha').onclick = () => {
            if(saveData.coins < 1000) return alert("コインが足りません!");
            saveData.coins -= 1000;
            let roll = Math.random();
            let newCharId = (roll < 0.01) ? 19 : Math.floor(Math.random() * 18) + 1;
            let cInfo = CHAR_DATA[newCharId];
            let resDiv = document.getElementById('gacha-result');
            if(saveData.chars.includes(newCharId)) {
                resDiv.innerText = `${cInfo.name} (ダブり... 300C還元)`; resDiv.style.color = "gray"; saveData.coins += 300;
            } else {
                resDiv.innerText = `NEW! ${cInfo.name} ゲット!!`; resDiv.style.color = "#00ffcc"; saveData.chars.push(newCharId);
            }
            resDiv.style.display = 'block'; saveGame(); document.getElementById('disp-coins').innerText = saveData.coins;
        };

        document.getElementById('btn-start').onclick = () => { isRaidMode = false; initGame(); };
        function startRaid(targetCharId, targetRStage) { isRaidMode = true; raidTargetCharId = targetCharId; raidTargetRookieStage = targetRStage; initGame(); }

        function initGame() {
            currentStage = parseInt(document.getElementById('stage-select').value);
            let c = CHAR_DATA[saveData.selectedChar];
            let isAwakened = saveData.awakenedChars.includes(c.id);
            let isHuman = (c.id === 0 && saveData.rookieAwakeStage >= 1);
            
            player = {
                x: width/2, y: height/2, size: 15, 
                hp: c.hp * (isAwakened ? 2 : 1), maxHp: c.hp * (isAwakened ? 2 : 1), 
                color: c.color, level: 1, exp: 0, maxExp: 3, cid: c.id,
                dodgeCount: 0, defenseMulti: isHuman ? 0.5 : 1, berserkStacks: 0,
                stats: { 
                    multi: c.multi + (isAwakened ? 1 : 0), 
                    power: c.atk * (isAwakened ? 1.5 : 1) + (saveData.rookieAwakeStage >= 4 ? 50 : 0),
                    speed: c.spd * (isAwakened ? 1.2 : 1), 
                    orbit: c.orb + (isAwakened ? 1 : 0), 
                    magnet: c.mag * (isAwakened ? 1.5 : 1) 
                }
            };
            
            document.getElementById('ui-char-name').innerHTML = getCharDisplayName(c.id);
            document.getElementById('ui-char-name').style.color = c.color;

            enemies = []; bullets = []; gems = []; orbits = []; damageTexts = []; hazards = [];
            scoreCoins = 0; playTime = 300; frameCount = 0;
            isBossActive = false;
            libTimer = 0; libCool = 0;
            
            targetPos = { x: player.x, y: player.y }; 
            state = 'PLAYING';
            
            document.querySelectorAll('.overlay').forEach(s => s.classList.add('hidden'));
            document.getElementById('ui-layer').classList.remove('hidden');
            document.getElementById('boss-notice').style.display = 'none';
            loop();
        }

        function triggerLevelUp() {
            state = 'LEVELUP';
            targetPos.x = player.x; targetPos.y = player.y;
            player.level++; player.exp -= player.maxExp; player.maxExp = Math.floor(3 + player.level * 1.5);

            document.getElementById('ui-level').innerText = player.level;
            const container = document.getElementById('skill-container');
            container.innerHTML = '';
            
            let pool = [...skillPool];
            if(player.cid === 0 && saveData.rookieAwakeStage >= 5 && libTimer <= 0 && libCool <= 0) {
                pool.push({id:'liberation', name:'能力解放', desc:'1分間超強化！(CT90秒)'});
            }
            
            pool.sort(() => 0.5 - Math.random()).slice(0, 3).forEach(s => {
                let div = document.createElement('div');
                div.className = 'skill-card';
                if(s.id==='liberation') div.style.borderColor = "#f00";
                div.innerHTML = `<strong>${s.name}</strong><p>${s.desc}</p>`;
                div.onclick = () => {
                    if(s.id === 'multi') player.stats.multi++;
                    if(s.id === 'power') player.stats.power += 10;
                    if(s.id === 'orbit') player.stats.orbit++;
                    if(s.id === 'magnet') player.stats.magnet += 60;
                    if(s.id === 'speed') player.stats.speed += 0.5;
                    if(s.id === 'heal') player.hp = Math.min(player.maxHp, player.hp + player.maxHp*0.5);
                    if(s.id === 'liberation') libTimer = 3600; 
                    
                    state = 'PLAYING'; targetPos.x = player.x; targetPos.y = player.y;
                    document.getElementById('screen-levelup').classList.add('hidden'); loop();
                };
                container.appendChild(div);
            });
            document.getElementById('screen-levelup').classList.remove('hidden');
        }

        function spawnEnemy() {
            if (isBossActive) return;
            let x = Math.random() < 0.5 ? (Math.random()<.5 ? -30 : width+30) : Math.random()*width;
            let y = (x < 0 || x > width) ? Math.random()*height : (Math.random()<.5 ? -30 : height+30);
            
            let timeMult = (300 - playTime) / 60;
            let hp = 20 * (1 + timeMult*2) * (1 + currentStage*0.2);
            let spd = 1.5 + timeMult*0.5 + currentStage*0.05;
            enemies.push({ x, y, size: 12, hp: hp, maxHp: hp, speed: spd, isBoss: false });
        }

        function spawnBoss() {
            isBossActive = true;
            document.getElementById('boss-notice').style.display = 'block';
            enemies = []; hazards = []; 
            
            if (isRaidMode) {
                document.getElementById('boss-notice').innerText = "WARNING: AWAKENED BOSS!!";
                setTimeout(() => document.getElementById('boss-notice').style.display = 'none', 3000);
                
                // ボスをより強力に設定
                let hp = (raidTargetCharId === 0) ? 150000 : 80000 * (1 + currentStage * 0.3); 
                let c = CHAR_DATA[raidTargetCharId];
                enemies.push({
                    x: width/2, y: -120, size: 80, hp: hp, maxHp: hp, speed: c.spd * 0.7, 
                    isBoss: true, isRaidBoss: true, color: c.color, name: c.name, atk: c.atk, multi: c.multi,
                    rStage: raidTargetRookieStage, rDodge: 0, rLib: 0
                });
            } else {
                document.getElementById('boss-notice').innerText = "STAGE BOSS!!";
                setTimeout(() => document.getElementById('boss-notice').style.display = 'none', 3000);
                // ボスのHPを大きく強化
                let hp = 15000 * (1 + currentStage * 0.8);
                enemies.push({
                    x: width/2, y: -120, size: 100, hp: hp, maxHp: hp, speed: 1.0 + currentStage*0.03, 
                    isBoss: true, stageIdx: currentStage 
                });
            }
        }

        function takeDamage(baseDmg, isHazard = false) {
            if(player.cid === 11 && isHazard) return; // ゴーストのギミック無効
            if(player.cid === 2 && Math.random() < 0.25) { // タンクの防御＆反射
                damageTexts.push({x: player.x, y: player.y-20, text: "BLOCK", life: 30, color:"#8b4513"});
                enemies.forEach(e => { if(Math.hypot(player.x-e.x, player.y-e.y)<150) e.hp -= player.stats.power; });
                return;
            }
            if(player.cid === 0 && saveData.rookieAwakeStage >= 3) {
                player.dodgeCount = (player.dodgeCount + 1) % 3;
                if(player.dodgeCount === 0) {
                    damageTexts.push({x: player.x, y: player.y-20, text: "MISS", life: 30, color:"#fff"});
                    return;
                }
            }
            if(player.cid === 9) { // エスパーの被弾時反撃
                for(let i=0; i<4; i++) {
                    bullets.push({x: player.x, y: player.y, vx: Math.cos(i*Math.PI/2)*8, vy: Math.sin(i*Math.PI/2)*8, life: 40, dmg: player.stats.power, isEnemy: false, color:"#0ff"});
                }
            }

            let dmg = baseDmg * player.defenseMulti;
            if(libTimer > 0) dmg *= 0.1;
            player.hp -= dmg;
            if(player.hp <= 0) end(false);
        }

        function update() {
            if(state !== 'PLAYING') return;
            frameCount++;

            // 動的ステータス計算（キャラ固有）
            let p = player.stats.power;
            if (player.cid === 8) p *= (2 - player.hp/player.maxHp); // サイボーグ
            if (player.cid === 10) p += player.berserkStacks; // バーサーカ
            if (player.cid === 14) p += Math.log10(saveData.coins + 1) * 10; // ギャンブラ

            if(libTimer > 0) {
                libTimer--;
                document.getElementById('liberation-ui').innerText = `能力解放中: ${Math.ceil(libTimer/60)}s`;
                if(frameCount % 300 === 0) {
                    enemies.forEach(e => {
                        if(Math.hypot(player.x-e.x, player.y-e.y) < 300) {
                            e.hp -= e.maxHp / 3;
                            damageTexts.push({x: e.x, y: e.y, text: Math.floor(e.maxHp/3), life: 30, color: "#f00"});
                        }
                    });
                }
                if(libTimer <= 0) libCool = 5400;
            } else if (libCool > 0) {
                libCool--;
                document.getElementById('liberation-ui').innerText = "";
            }

            if(frameCount % 60 === 0) {
                playTime--; scoreCoins += (player.cid === 14 ? 4 : 2);
                // ドクター回復 / ヒューマン回復
                if(player.cid === 15) player.hp = Math.min(player.maxHp, player.hp + 5); 
                if(player.cid === 0 && saveData.rookieAwakeStage >= 1) player.hp = Math.min(player.maxHp, player.hp + player.maxHp / 5);
                // パラディンバリア増加
                if(player.cid === 5 && player.stats.orbit < 10 && frameCount % 300 === 0) player.stats.orbit++;
                // マグネ回収範囲増加
                if(player.cid === 4) player.stats.magnet += 1;

                if(playTime <= 180 && !isBossActive) spawnBoss();
                if(playTime <= 0) end(true);
            }

            // キャラ固有スキル（特殊弾・アクション）
            if(frameCount % 120 === 0) {
                if(player.cid === 1) { // ニンジャ クナイ
                    for(let i=0; i<8; i++){ bullets.push({x: player.x, y: player.y, vx: Math.cos(i*Math.PI/4)*12, vy: Math.sin(i*Math.PI/4)*12, life: 50, dmg: p, isEnemy: false, color:"#aaa"}); }
                }
                if(player.cid === 12) { // サムライ 斬撃
                    bullets.push({x: player.x, y: player.y, vx: 0, vy: 0, life: 10, dmg: p*4, isEnemy: false, size: 120, isMelee: true});
                }
                if(player.cid === 17) { // エイリアン ワープ＆爆破
                    bullets.push({x: player.x, y: player.y, vx: 0, vy: 0, life: 30, dmg: p*3, isEnemy: false, size: 100, isBomb: true});
                    player.x = Math.random()*width; player.y = Math.random()*height;
                }
            }
            if(player.cid === 3 && frameCount % 150 === 0) { // スナイパ 貫通レーザー
                let a = Math.atan2(targetPos.y-player.y, targetPos.x-player.x);
                bullets.push({x: player.x, y: player.y, vx: Math.cos(a)*25, vy: Math.sin(a)*25, life: 100, dmg: p*2.5, isEnemy: false, isPiercing: true, color:"#0f0", size: 8});
            }
            if(player.cid === 18 && frameCount % 180 > 140 && frameCount % 4 === 0) { // ドラゴン ブレス
                let a = Math.atan2(targetPos.y-player.y, targetPos.x-player.x) + (Math.random()-0.5)*0.6;
                bullets.push({x: player.x, y: player.y, vx: Math.cos(a)*12, vy: Math.sin(a)*12, life: 35, dmg: p*0.6, isEnemy: false, color:"#f40", size: 18});
            }
            if(player.cid === 19 && frameCount % 600 === 0) { // カミサマ 神の雷
                enemies.forEach(e => { e.hp -= p * 5; damageTexts.push({x: e.x, y: e.y, text: Math.floor(p*5), life: 40, color: "#ffea00"}); });
            }

            let spd = player.stats.speed;
            if(libTimer > 0) spd *= 2.5; 
            let dx = targetPos.x - player.x, dy = targetPos.y - player.y;
            player.x += dx * 0.1 * (spd/4); player.y += dy * 0.1 * (spd/4);

            if(!isBossActive) {
                let gType = currentStage % 6; 
                if(frameCount % (180 - currentStage*2) === 0) {
                    if(gType === 1) hazards.push({ x: Math.random()*width, y: Math.random()*height, size: 50+currentStage*2, life: 300, type:'poison' });
                    if(gType === 2) hazards.push({ x: Math.random()*width, y: Math.random()*height, size: 80, life: 200, type:'slow' });
                    if(gType === 3) hazards.push({ x: Math.random()*width, y: -50, size: 30, life: 400, type:'meteor', vx: (Math.random()-0.5)*5, vy: 3 });
                }
            }

            // 射撃（ガンナーは連射速度2倍）
            let shotInterval = (libTimer > 0) ? 5 : (player.cid === 6 ? 7 : 15);
            if(frameCount % shotInterval === 0 && enemies.length > 0) {
                let target = enemies[0];
                let minDist = Math.hypot(player.x-target.x, player.y-target.y);
                enemies.forEach(e => { let d = Math.hypot(player.x-e.x, player.y-e.y); if(d < minDist) { minDist = d; target = e; } });
                let angle = Math.atan2(target.y-player.y, target.x-player.x);
                let isHuman = (player.cid === 0 && saveData.rookieAwakeStage >= 1);
                
                for(let i=0; i<player.stats.multi; i++){
                    let a = angle + (i - (player.stats.multi-1)/2) * 0.2;
                    bullets.push({
                        x: player.x, y: player.y, vx: Math.cos(a)*12, vy: Math.sin(a)*12, 
                        life: 50, dmg: p, isEnemy: false, isWave: isHuman, isLib: (libTimer>0), isHoming: (player.cid === 16)
                    });
                }
            }

            if(!isBossActive) {
                let spawnRate = Math.max(2, 25 - Math.floor((300-playTime)/6));
                if(frameCount % spawnRate === 0) spawnEnemy();
            }

            orbits = [];
            for(let i=0; i<player.stats.orbit; i++) {
                let a = (frameCount * 0.1) + (i * Math.PI*2 / player.stats.orbit);
                orbits.push({x: player.x + Math.cos(a)*80, y: player.y + Math.sin(a)*80, size: 10});
            }

            for(let i=bullets.length-1; i>=0; i--){
                let b = bullets[i]; 
                // ホーミング弾 (アーチャー)
                if(b.isHoming && enemies.length > 0) {
                    let t = enemies[0]; let md = Math.hypot(b.x-t.x, b.y-t.y);
                    enemies.forEach(e => { let d = Math.hypot(b.x-e.x, b.y-e.y); if(d<md){md=d; t=e;} });
                    let a = Math.atan2(t.y-b.y, t.x-b.x);
                    b.vx = b.vx*0.95 + Math.cos(a)*0.8; b.vy = b.vy*0.95 + Math.sin(a)*0.8;
                }
                b.x += b.vx; b.y += b.vy; b.life--;
                
                if(b.isEnemy && Math.hypot(player.x-b.x, player.y-b.y) < player.size + (b.size||5)) {
                    takeDamage(b.dmg);
                    bullets.splice(i, 1); continue;
                }
                if(b.life <= 0) bullets.splice(i, 1);
            }

            let pAura = (player.cid === 0 && saveData.rookieAwakeStage >= 2) ? 150 : 0;

            for(let ei = enemies.length-1; ei>=0; ei--) {
                let e = enemies[ei];
                let angle = Math.atan2(player.y-e.y, player.x-e.x);
                let eSpd = e.speed;
                if(pAura > 0 && Math.hypot(player.x-e.x, player.y-e.y) < pAura) eSpd *= 0.5;
                
                e.x += Math.cos(angle) * eSpd; e.y += Math.sin(angle) * eSpd;

                if(e.isBoss) {
                    if (e.isRaidBoss) {
                        if(e.rStage >= 5 && frameCount % 600 === 0) e.rLib = 300;
                        if(e.rLib > 0) { e.rLib--; e.speed = 10; } else { e.speed = CHAR_DATA[0].spd * 0.7; }
                        if(e.rStage >= 2 && Math.hypot(player.x-e.x, player.y-e.y) < 200) {
                            let dx = player.x - e.x, dy = player.y - e.y;
                            player.x -= dx * 0.05; player.y -= dy * 0.05; 
                        }
                        if(frameCount % (e.rLib > 0 ? 10 : 40) === 0) {
                            let pwr = e.atk * (e.rStage >= 4 ? 2 : 1);
                            for(let i=0; i<e.multi + (e.rStage >= 1 ? 2 : 0); i++){
                                let a = angle + (i - 1) * 0.25;
                                bullets.push({x: e.x, y: e.y, vx: Math.cos(a)*6, vy: Math.sin(a)*6, life: 100, dmg: pwr, isEnemy: true, size: 10});
                            }
                        }
                    } else {
                        if(frameCount % 60 === 0) {
                            let bType = e.stageIdx % 5;
                            let bShots = Math.floor(e.stageIdx / 3) + 4;
                            if(bType === 0) { 
                                for(let i=0; i<bShots; i++){
                                    let a = (Math.PI*2/bShots) * i;
                                    bullets.push({x: e.x, y: e.y, vx: Math.cos(a)*5, vy: Math.sin(a)*5, life: 120, dmg: 15+e.stageIdx, isEnemy: true});
                                }
                            } else if(bType === 1) { 
                                let a = frameCount * 0.1 + e.stageIdx;
                                bullets.push({x: e.x, y: e.y, vx: Math.cos(a)*7, vy: Math.sin(a)*7, life: 100, dmg: 20, isEnemy: true});
                            } else if(bType === 2) { 
                                e.speed = 15; setTimeout(()=>{if(e) e.speed = 1.0;}, 500);
                            } else if(bType === 3) { 
                                for(let i=0; i<3; i++){
                                    let a = angle + (Math.random()-0.5);
                                    bullets.push({x: e.x, y: e.y, vx: Math.cos(a)*8, vy: Math.sin(a)*8, life: 80, dmg: 15, isEnemy: true});
                                }
                            } else if(bType === 4) { 
                                enemies.push({ x: e.x, y: e.y, size: 10, hp: 50, maxHp: 50, speed: 2.5, isBoss: false });
                            }
                        }
                    }
                }

                for(let bi=bullets.length-1; bi>=0; bi--) {
                    let b = bullets[bi];
                    if(!b.isEnemy && Math.hypot(e.x-b.x, e.y-b.y) < e.size + (b.size||10)) {
                        if(e.isRaidBoss && e.rStage >= 3) {
                            e.rDodge = (e.rDodge + 1) % 3;
                            if(e.rDodge === 0) { bullets.splice(bi, 1); continue; }
                        }
                        e.hp -= b.dmg;
                        if(b.isWave) { e.x += b.vx*1.5; e.y += b.vy*1.5; }
                        damageTexts.push({x: e.x, y: e.y, text: Math.floor(b.dmg), life: 20});
                        if(!b.isPiercing && !b.isMelee && !b.isBomb) bullets.splice(bi, 1);
                    }
                }

                orbits.forEach(o => {
                    if(Math.hypot(e.x-o.x, e.y-o.y) < e.size + o.size && frameCount % 10 === 0) {
                        e.hp -= p;
                        damageTexts.push({x: e.x, y: e.y, text: Math.floor(p), life: 20});
                    }
                });

                if(e.hp <= 0) {
                    if(e.isBoss) { 
                        // ★ ボス撃破で即クリアにする変更
                        enemies = []; bullets = []; 
                        end(true); return; 
                    }
                    if(player.cid === 7 && Math.random()<0.2) player.hp = Math.min(player.maxHp, player.hp+2); // ヴァンピィ回復
                    if(player.cid === 10) player.berserkStacks += 1; // バーサーカ攻撃力アップ
                    if(player.cid === 13 && Math.random()<0.2) { // リッチの魔法弾
                        for(let i=0;i<3;i++){
                            let a=Math.random()*Math.PI*2;
                            bullets.push({x:e.x, y:e.y, vx:Math.cos(a)*5, vy:Math.sin(a)*5, life:60, dmg:p, isEnemy:false, color:"#808"});
                        }
                    }
                    gems.push({x: e.x, y: e.y, val: 1});
                    enemies.splice(ei, 1); scoreCoins += 5;
                } else if(Math.hypot(player.x-e.x, player.y-e.y) < player.size + e.size) {
                    takeDamage(e.isBoss ? 20 : 3);
                }
            }

            for(let i=hazards.length-1; i>=0; i--) {
                let h = hazards[i];
                if(h.type==='meteor') { h.x+=h.vx; h.y+=h.vy; }
                h.life--;
                if(Math.hypot(player.x-h.x, player.y-h.y) < player.size + h.size) {
                    if(h.type==='poison' && frameCount % 10===0) takeDamage(3, true);
                    if(h.type==='slow') player.x -= dx*0.08, player.y -= dy*0.08;
                    if(h.type==='meteor') { takeDamage(25, true); h.life = 0; }
                }
                if(h.life <= 0) hazards.splice(i, 1);
            }

            for(let gi=gems.length-1; gi>=0; gi--) {
                let g = gems[gi];
                let d = Math.hypot(player.x-g.x, player.y-g.y);
                if(d < player.stats.magnet) { let a = Math.atan2(player.y-g.y, player.x-g.x); g.x += Math.cos(a)*15; g.y += Math.sin(a)*15; }
                if(d < 20) { player.exp += g.val; gems.splice(gi, 1); if(player.exp >= player.maxExp) triggerLevelUp(); }
            }

            damageTexts.forEach((d, i) => { d.y--; d.life--; if(d.life <= 0) damageTexts.splice(i, 1); });

            let m = Math.floor(playTime/60), s = playTime%60;
            document.getElementById('timer').innerText = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            document.getElementById('exp-bar').style.width = (player.exp/player.maxExp*100) + "%";
        }

        function draw() {
            ctx.fillStyle = (currentStage % 4 === 0 && !isBossActive) ? "rgba(0, 0, 0, 0.9)" : "rgba(5, 5, 15, 0.4)";
            ctx.fillRect(0, 0, width, height);

            hazards.forEach(h => {
                if(h.type==='poison') ctx.fillStyle = `rgba(100, 0, 100, ${h.life/300 * 0.5})`;
                if(h.type==='slow') ctx.fillStyle = `rgba(0, 50, 100, ${h.life/200 * 0.4})`;
                if(h.type==='meteor') ctx.fillStyle = `rgba(255, 100, 0, 0.8)`;
                ctx.beginPath(); ctx.arc(h.x, h.y, h.size, 0, Math.PI*2); ctx.fill();
            });

            gems.forEach(g => { ctx.fillStyle = "#0f8"; ctx.beginPath(); ctx.arc(g.x, g.y, 4, 0, Math.PI*2); ctx.fill(); });
            
            bullets.forEach(b => { 
                if(b.isMelee || b.isBomb) {
                    ctx.fillStyle = b.isMelee ? "rgba(255,255,255,0.3)" : "rgba(128,255,0,0.4)";
                    ctx.beginPath(); ctx.arc(b.x, b.y, b.size, 0, Math.PI*2); ctx.fill();
                } else if(b.isEnemy) {
                    ctx.fillStyle = "#f0f"; ctx.beginPath(); ctx.arc(b.x, b.y, b.size||5, 0, Math.PI*2); ctx.fill(); 
                } else if(b.isWave) {
                    ctx.fillStyle = b.isLib ? "#f00" : "#0af";
                    ctx.save(); ctx.translate(b.x, b.y); ctx.rotate(Math.atan2(b.vy, b.vx));
                    ctx.beginPath(); ctx.ellipse(0, 0, 15, 5, 0, 0, Math.PI*2); ctx.fill(); ctx.restore();
                } else {
                    ctx.fillStyle = b.color || "#ff0"; ctx.beginPath(); ctx.arc(b.x, b.y, b.size||5, 0, Math.PI*2); ctx.fill(); 
                }
            });
            
            orbits.forEach(o => { ctx.fillStyle = "#0ff"; ctx.beginPath(); ctx.arc(o.x, o.y, o.size, 0, Math.PI*2); ctx.fill(); });
            
            if(player.cid === 0 && saveData.rookieAwakeStage >= 2) {
                ctx.strokeStyle = "rgba(255,255,255,0.3)"; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.arc(player.x, player.y, 150, 0, Math.PI*2); ctx.stroke();
            }

            enemies.forEach(e => {
                if(e.isRaidBoss) {
                    if(e.rStage >= 2) { ctx.strokeStyle = "rgba(255,255,255,0.2)"; ctx.beginPath(); ctx.arc(e.x, e.y, 200, 0, Math.PI*2); ctx.stroke(); }
                    if(e.rLib > 0) {
                        let grad = ctx.createLinearGradient(e.x, e.y-e.size, e.x, e.y+e.size);
                        grad.addColorStop(0, "black"); grad.addColorStop(1, "red"); ctx.fillStyle = grad;
                    } else { ctx.fillStyle = e.color; }
                    ctx.beginPath(); ctx.arc(e.x, e.y, e.size, 0, Math.PI*2); ctx.fill();
                    ctx.strokeStyle = "white"; ctx.lineWidth = 4; ctx.stroke();
                    ctx.fillStyle = "red"; ctx.fillRect(e.x-e.size, e.y-e.size-15, e.size*2*(e.hp/e.maxHp), 8);
                    ctx.fillStyle = "#ff00ff"; ctx.font = "bold 24px sans-serif"; ctx.textAlign = "center";
                    ctx.fillText(e.rStage > 0 ? ROOKIE_NAMES[e.rStage] : e.name, e.x, e.y+e.size+30);
                } else {
                    ctx.fillStyle = e.isBoss ? "#800" : "#f44"; ctx.fillRect(e.x-e.size, e.y-e.size, e.size*2, e.size*2);
                    ctx.fillStyle = "red"; ctx.fillRect(e.x-e.size, e.y-e.size-10, e.size*2*(e.hp/e.maxHp), 6);
                    if(e.isBoss) { ctx.fillStyle = "white"; ctx.font = "20px sans-serif"; ctx.textAlign = "center"; ctx.fillText("BOSS", e.x, e.y+e.size+20); }
                }
            });

            if(libTimer > 0) {
                let grad = ctx.createLinearGradient(player.x, player.y-player.size, player.x, player.y+player.size);
                grad.addColorStop(0, "black"); grad.addColorStop(1, "red"); ctx.fillStyle = grad;
                ctx.fillStyle = "rgba(255,0,0,0.2)"; ctx.beginPath(); ctx.arc(player.x, player.y, 50, 0, Math.PI*2); ctx.fill();
            } else {
                ctx.fillStyle = player.color;
            }
            ctx.beginPath(); ctx.arc(player.x, player.y, player.size, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = "white"; ctx.lineWidth = 2; ctx.stroke();
            
            ctx.fillStyle = "#f00"; ctx.fillRect(player.x-25, player.y+22, 50, 6);
            ctx.fillStyle = "#0f0"; ctx.fillRect(player.x-25, player.y+22, 50*(player.hp/player.maxHp), 6);

            ctx.textAlign = "center"; ctx.font = "bold 16px sans-serif";
            damageTexts.forEach(d => { ctx.fillStyle = d.color||"white"; ctx.globalAlpha = d.life/20; ctx.fillText(d.text, d.x, d.y); });
            ctx.globalAlpha = 1;
        }

        function end(win) {
            state = 'RESULT';
            document.getElementById('ui-layer').classList.add('hidden');
            document.getElementById('screen-result').classList.remove('hidden');
            let titleEl = document.getElementById('res-title');
            titleEl.innerText = win ? "STAGE CLEAR!!" : "GAME OVER"; titleEl.style.color = win ? "#0f0" : "#f00";
            
            if(win) {
                scoreCoins += 1000;
                if(isRaidMode) {
                    scoreCoins += 5000; 
                    if(raidTargetCharId === 0) {
                        saveData.rookieAwakeStage = raidTargetRookieStage;
                        titleEl.innerText = `${ROOKIE_NAMES[raidTargetRookieStage]} AWAKENED!`; titleEl.style.color = "#ff00ff";
                    } else if(!saveData.awakenedChars.includes(raidTargetCharId)) {
                        saveData.awakenedChars.push(raidTargetCharId);
                        titleEl.innerText = "AWAKENING SUCCESS!!"; titleEl.style.color = "#ff00ff";
                    }
                } else if(saveData.unlockedStage === currentStage && currentStage < 30) { saveData.unlockedStage++; }
            }
            saveData.coins += scoreCoins; saveGame(); document.getElementById('res-coins').innerText = scoreCoins;
        }

        function loop() { if(state === 'PLAYING') { update(); draw(); requestAnimationFrame(loop); } }
        window.addEventListener('mousemove', e => { if(state === 'PLAYING') { targetPos.x = e.clientX; targetPos.y = e.clientY; } });
        window.addEventListener('touchmove', e => { if(state === 'PLAYING') { targetPos.x = e.touches[0].clientX; targetPos.y = e.touches[0].clientY; } });
        document.getElementById('btn-restart').onclick = openHome;

        loadData();
    </script>
</body>
</html>
